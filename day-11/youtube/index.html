<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/logo.png">
    <script src="https://kit.fontawesome.com/1645109bb2.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="container">
        <div class="navbar">

            <div class="logo">
                <i class="fa-brands fa-youtube"></i>
                <h2>My Tube</h2>
            </div>
            

            <div class="searchbar">
                <input id="searchquery" type="text" placeholder="Enter your link... ">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <i class="fa-solid fa-share"></i>
        </div>


        <div class="videobar">
            <iframe id="ytplayer""
            src="https://www.youtube.com/embed/i1pvbcT46bY?autoplay=1&mute=1" allowfullscreen autoplay=1> </iframe>
        </div>
    </div>



</body>
</html>
