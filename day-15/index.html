<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">

        <div id="inputscreen">
            <input id="num" type="text" placeholder="Type a number..">
            <button id="genbtn" onclick="generate()">Generate Table</button>
        </div>

        <div id="outputscreen">
            <h3 id="tabletitle"></h3>
            <ul id="tablelist">
            </ul>
            <button id="genbtn" onclick="back()">Go Back</button>
        </div>

    </div>

    <script>
        
        let num = document.getElementById('num');
        let tabletitle = document.getElementById('tabletitle');
        let tablelist = document.getElementById('tablelist');
        let outputscreen = document.getElementById('outputscreen');
        let inputscreen = document.getElementById('inputscreen');

        function generate() {
            let n = num.value;
            tabletitle.innerHTML = "Table of " + n;

            tablelist.replaceChildren();
            for (let i = 1; i<=10; i++){
                let elem = document.createElement('li');
                elem.innerHTML = `<span>${n}</span><span>x</span><span>${i}</span><span>=</span><span>${n * i}</span>`
                tablelist.appendChild(elem);
            }
            outputscreen.style.display = "flex";
            inputscreen.style.display = "none";
        }

        function back () {
            outputscreen.style.display = "none";
            inputscreen.style.display = "flex";
        }
    </script>
</body>
</html>
