<html>

    <head>
        <title>Task Timer</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="main">
            <div id="input">
                <input id="task" type="text" placeholder="Plan the task...">
                <input id="time" type="text" placeholder="No. of minutes">
                <button onclick="start()" id="btn">Start</button>
            </div>

            <div id="clock">
                <h2 id="tasktitle">- No Task -</h2>
                <h1><span id="timer">00:00</span></h1>
            </div>
        </div>
        <script src="app.js"></script>
    </body>

</html>
